<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Miru</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0c0f;
  --surface: #16161a;
  --surface2: #1e1e24;
  --border: rgba(255,255,255,0.07);
  --text: #f0f0f2;
  --muted: #60606a;
  --muted2: #9090a0;
  --accent: #22c55e;
  --accent2: #4ade80;
  --r: 20px;
  --shadow: 0 4px 24px rgba(0,0,0,.4);
}

body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
  min-height: 100dvh; overflow-x: hidden;
}

/* ── PAGE ── */
.page { max-width: 480px; margin: 0 auto; padding: 0 0 160px; }

/* ── HERO ── */
.hero {
  padding: env(safe-area-inset-top, 48px) 20px 24px;
  padding-top: calc(env(safe-area-inset-top, 0px) + 48px);
}
.hero-eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted2); margin-bottom: 6px;
}
.hero-date {
  font-size: 32px; font-weight: 900; letter-spacing: -1.5px;
  color: var(--text); line-height: 1.1; margin-bottom: 4px;
}
.hero-sub { font-size: 13px; color: var(--muted); }
.hero-right { margin-left: auto; }
.wfh-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 30px; padding: 10px 16px; cursor: pointer;
  font-size: 13px; font-weight: 700; color: var(--muted2);
  -webkit-tap-highlight-color: transparent; transition: all .2s;
}
.wfh-pill.active { background: rgba(34,197,94,.12); border-color: rgba(34,197,94,.3); color: #4ade80; }
.hero-row { display: flex; align-items: flex-start; gap: 12px; }

/* ── SECTION LABEL ── */
.slabel {
  font-size: 10px; font-weight: 700; letter-spacing: 1.4px;
  text-transform: uppercase; color: var(--muted);
  padding: 24px 20px 10px; display: flex; align-items: center; justify-content: space-between;
}
.slabel-more { letter-spacing: 0; text-transform: none; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--muted2); }

/* ── WEATHER HERO CARD ── */
.wx-hero {
  margin: 0 20px 12px;
  background: linear-gradient(145deg, #1a2744 0%, #0f1f3d 100%);
  border: 1px solid rgba(56,189,248,.15);
  border-radius: var(--r); padding: 20px 22px;
  display: flex; align-items: center; gap: 16px;
  cursor: pointer;
}
.wx-temp-big { font-size: 52px; font-weight: 900; letter-spacing: -3px; color: #e0f2fe; line-height: 1; }
.wx-right { flex: 1; }
.wx-condition { font-size: 16px; font-weight: 700; color: #bae6fd; margin-bottom: 3px; }
.wx-feels { font-size: 12px; color: #7dd3fc; }
.wx-badge {
  margin-top: 8px; display: inline-flex; align-items: center;
  font-size: 11px; font-weight: 700; padding: 4px 10px;
  border-radius: 20px; background: rgba(56,189,248,.15); color: #7dd3fc;
}

/* ── TRAIN CARD ── */
.trains-card {
  margin: 0 20px 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
  cursor: pointer;
}
.train-header {
  padding: 12px 18px 0; font-size: 10px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
}
.train-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 18px; border-bottom: 1px solid var(--border);
}
.train-row:last-child { border-bottom: none; }
.train-time { font-size: 22px; font-weight: 900; letter-spacing: -1px; color: #a5b4fc; min-width: 58px; }
.train-dest { flex: 1; font-size: 13px; color: var(--muted2); line-height: 1.4; }
.train-dest strong { font-weight: 700; color: var(--text); display: block; }
.train-badge {
  font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 12px;
  white-space: nowrap; flex-shrink: 0;
}
.tb-ok   { background: rgba(245,158,11,.12); color: #fbbf24; }
.tb-late { background: rgba(239,68,68,.12);  color: #f87171; }
.tb-gone { background: rgba(99,102,241,.1);  color: #818cf8; }

/* ── FUEL CARD ── */
.fuel-card {
  margin: 0 20px 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 18px 20px;
  display: flex; align-items: center; gap: 0;
  cursor: pointer;
}
.fuel-type-label { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
.fuel-price { font-size: 36px; font-weight: 900; letter-spacing: -2px; line-height: 1; }
.fuel-petrol { color: #fbbf24; }
.fuel-diesel { color: #f97316; }
.fuel-divider { width: 1px; background: var(--border); align-self: stretch; margin: 0 20px; }
.fuel-station { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* ── SCHOOL MESSAGES ── */
.school-card {
  margin: 0 20px 8px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px;
  display: flex; align-items: flex-start; gap: 12px;
}
.school-dot { width: 8px; height: 8px; border-radius: 50%; background: #fbbf24; flex-shrink: 0; margin-top: 5px; }
.school-dot.u { background: #f87171; }
.school-title { font-size: 14px; font-weight: 700; color: var(--text); }
.school-body  { font-size: 12px; color: var(--muted2); margin-top: 3px; line-height: 1.5; }
.school-meta  { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── SAVES STRIP ── */
.saves-row {
  display: flex; gap: 8px; padding: 0 20px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; scroll-snap-type: x mandatory;
}
.saves-row::-webkit-scrollbar { display: none; }
.save-chip {
  display: flex; align-items: center; gap: 7px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 24px; padding: 9px 14px;
  font-size: 13px; font-weight: 600; color: var(--text);
  white-space: nowrap; flex-shrink: 0; scroll-snap-align: start;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}

/* ── TOOL GRID ── */
.tool-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; padding: 0 20px;
}
.tool-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 16px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: background .15s;
}
.tool-card:active { background: var(--surface2); }
.tool-icon  { font-size: 24px; margin-bottom: 8px; }
.tool-label { font-size: 14px; font-weight: 700; }
.tool-sub   { font-size: 11px; color: var(--muted2); margin-top: 2px; }

/* ── NEARBY STRIP ── */
.nearby-row {
  display: flex; gap: 10px; padding: 0 20px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.nearby-row::-webkit-scrollbar { display: none; }
.nearby-chip {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 12px 14px; flex-shrink: 0;
  cursor: pointer; min-width: 120px;
}
.nearby-chip-icon { font-size: 20px; margin-bottom: 6px; }
.nearby-chip-name { font-size: 12px; font-weight: 700; color: var(--text); }
.nearby-chip-dist { font-size: 11px; color: var(--muted2); margin-top: 2px; }

/* ── ONBOARDING ── */
.ob-wrap { padding: 24px 20px; }
.ob-hero {
  background: linear-gradient(135deg, #064e3b, #065f46);
  border-radius: var(--r); padding: 26px 22px; margin-bottom: 16px;
}
.ob-hero h2 { font-size: 24px; font-weight: 900; color: #fff; letter-spacing: -.6px; margin-bottom: 6px; }
.ob-hero p  { font-size: 13px; color: #86efac; line-height: 1.6; }
.ob-form { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 22px; }
.ob-label { font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--muted2); display: block; margin-bottom: 6px; }
.ob-input {
  width: 100%; padding: 13px 14px; border: 1.5px solid var(--border);
  border-radius: 12px; font-size: 16px; font-family: inherit;
  background: var(--surface2); color: var(--text); outline: none;
  margin-bottom: 14px;
}
.ob-input:focus { border-color: #22c55e; }
.ob-btn {
  width: 100%; padding: 15px; background: linear-gradient(135deg,#22c55e,#16a34a);
  color: #fff; font-size: 15px; font-weight: 800; border: none;
  border-radius: 14px; cursor: pointer; letter-spacing: -.2px;
}

/* ── SKELETON ── */
.skel {
  background: linear-gradient(90deg, var(--surface2) 25%, var(--surface) 50%, var(--surface2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 6px; display: block;
}
@keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }

/* ── PILL NAV ── */
#pill-overlay { display:none; position:fixed; inset:0; z-index:200; }
#pill-overlay.show { display:block; }
#pill-nav { position:fixed; bottom:calc(20px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); z-index:300; }
#pill-shell {
  display:flex; align-items:center; justify-content:center;
  background:rgba(22,22,26,.96); backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border:1px solid var(--border); border-radius:30px; height:46px; width:150px;
  overflow:hidden; position:relative; cursor:pointer;
  transition:width .38s cubic-bezier(.34,1.56,.64,1); box-shadow:var(--shadow);
}
#pill-shell.expanded { width: 264px; }
#pill-resting {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  gap:6px; opacity:1; transition:opacity .2s; pointer-events:auto; padding:0 16px; white-space:nowrap;
}
#pill-shell.expanded #pill-resting { opacity:0; pointer-events:none; }
.pr-label { font-size:14px; font-weight:600; color:var(--text); }
.pr-chev { width:14px; height:14px; stroke:var(--muted); fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; transition:transform .3s; flex-shrink:0; }
#pill-shell.expanded .pr-chev { transform:rotate(180deg); }
#pill-icons {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:space-around;
  padding:0 8px; opacity:0; transition:opacity .18s ease .1s; pointer-events:none;
}
#pill-shell.expanded #pill-icons { opacity:1; pointer-events:auto; }
.pi-btn { display:flex; flex-direction:column; align-items:center; gap:4px; background:none; border:none; cursor:pointer; color:var(--muted); padding:6px 10px; border-radius:12px; transition:color .15s; }
.pi-btn.pi-active { color:var(--text); }
.pi-icon { font-size:20px; line-height:1; }
.pi-dot { width:4px; height:4px; border-radius:50%; background:var(--accent); opacity:0; transition:opacity .2s; }
.pi-btn.pi-active .pi-dot { opacity:1; }

/* ── VOICE FAB ── */
#voice-fab {
  position:fixed; bottom:calc(82px + env(safe-area-inset-bottom)); right:20px; z-index:290;
  width:52px; height:52px; border-radius:50%;
  background:linear-gradient(135deg,#7c3aed,#4f46e5);
  border:none; cursor:pointer; box-shadow:0 4px 20px rgba(124,58,237,.45);
  display:flex; align-items:center; justify-content:center;
  font-size:22px; transition:transform .15s, box-shadow .15s;
  -webkit-tap-highlight-color:transparent;
}
#voice-fab:active { transform:scale(.93); }
#voice-overlay {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,.7); backdrop-filter:blur(4px);
  align-items:flex-end; justify-content:center;
}
#voice-overlay.show { display:flex; }
#voice-card {
  background:var(--surface); border-radius:28px 28px 0 0;
  width:100%; max-width:560px; padding:32px 28px 40px;
}
#voice-orb {
  width:80px; height:80px; border-radius:50%;
  background:linear-gradient(135deg,#7c3aed,#4f46e5);
  display:flex; align-items:center; justify-content:center;
  font-size:32px; margin:0 auto 16px; transition:box-shadow .3s;
}
#voice-orb.listening { animation:vpulse 1.2s ease-in-out infinite; }
@keyframes vpulse { 0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,.5)} 50%{box-shadow:0 0 0 18px rgba(124,58,237,0)} }
#voice-status { text-align:center; font-size:16px; font-weight:700; margin-bottom:6px; }
#voice-transcript { text-align:center; font-size:13px; color:var(--muted); min-height:20px; margin-bottom:16px; font-style:italic; }
#voice-answer { background:var(--surface2); border-radius:16px; padding:14px 16px; font-size:15px; line-height:1.55; display:none; margin-bottom:20px; }
#voice-actions { display:flex; gap:10px; }
.vbtn { flex:1; padding:13px; border-radius:14px; border:none; font-size:14px; font-weight:700; cursor:pointer; }
.vbtn-primary { background:linear-gradient(135deg,#7c3aed,#4f46e5); color:#fff; }
.vbtn-secondary { background:var(--surface2); color:var(--muted); }

#toast {
  position:fixed; bottom:130px; left:50%; transform:translateX(-50%) translateY(10px);
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:8px 18px; font-size:13px; font-weight:600;
  opacity:0; transition:opacity .2s,transform .2s; pointer-events:none;
  white-space:nowrap; z-index:400;
}
</style>
</head>
<body>
<div class="page">
  <div class="hero">
    <div class="hero-row">
      <div>
        <div class="hero-eyebrow" id="hero-eyebrow">Good morning</div>
        <div class="hero-date" id="hero-date">Friday</div>
        <div class="hero-sub" id="hero-sub">Loading…</div>
      </div>
      <div class="hero-right">
        <button class="wfh-pill" id="wfh-btn" onclick="_toggleWfh()">🏢 Office</button>
      </div>
    </div>
  </div>

  <div id="content"></div>
</div>

<!-- PILL NAV -->
<div id="pill-overlay" onclick="_pillCollapse()"></div>
<div id="pill-nav">
  <div id="pill-shell" onclick="_pillTap(event)">
    <div id="pill-resting">
      <span style="font-size:18px" id="pill-icon">🏠</span>
      <span class="pr-label" id="pill-label">Home</span>
      <svg class="pr-chev" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div id="pill-icons">
      <button class="pi-btn pi-active" id="pi-home"   onclick="_pillNav('home');event.stopPropagation()"><span class="pi-icon">🏠</span><div class="pi-dot"></div></button>
      <button class="pi-btn"           id="pi-myarea" onclick="_pillNav('myarea');event.stopPropagation()"><span class="pi-icon">📍</span><div class="pi-dot"></div></button>
      <button class="pi-btn"           id="pi-intel"  onclick="_pillNav('intel');event.stopPropagation()"><span class="pi-icon">🔍</span><div class="pi-dot"></div></button>
      <button class="pi-btn"           id="pi-saves"  onclick="_pillNav('saves');event.stopPropagation()"><span class="pi-icon">📌</span><div class="pi-dot"></div></button>
    </div>
  </div>
</div>

<button id="voice-fab" onclick="_voiceOpen()">🎤</button>

<div id="voice-overlay" onclick="_voiceOverlayTap(event)">
  <div id="voice-card">
    <div id="voice-orb">🎤</div>
    <div id="voice-status">Tap the mic to ask anything</div>
    <div id="voice-transcript"></div>
    <div id="voice-answer"></div>
    <div id="voice-actions">
      <button class="vbtn vbtn-primary" id="voice-mic-btn" onclick="_voiceListen()">🎤 Ask</button>
      <button class="vbtn vbtn-secondary" onclick="_voiceClose()">Done</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ── IDENTITY ──────────────────────────────────────────────────
(function(){
  var p = new URLSearchParams(location.search);
  var pc = (p.get('pc')||p.get('postcode')||'').replace(/\s+/g,'').toUpperCase();
  var ph = p.get('phone')||'';
  if (pc && !localStorage.getItem('miru_postcode')) localStorage.setItem('miru_postcode', pc);
  if (ph && !localStorage.getItem('miru_phone'))    localStorage.setItem('miru_phone', ph);
})();

const PC    = (localStorage.getItem('miru_postcode')||'').replace(/\s+/g,'').toUpperCase();
const PC_FMT = PC.length > 4 ? PC.slice(0,-3)+' '+PC.slice(-3) : PC;
const PHONE  = localStorage.getItem('miru_phone')||'';

// ── TIME HELPERS ──────────────────────────────────────────────
function hour() { return new Date().getHours(); }
function timeOfDay() {
  const h = hour();
  if (h >= 5  && h < 11) return 'morning';
  if (h >= 11 && h < 17) return 'afternoon';
  if (h >= 17 && h < 22) return 'evening';
  return 'night';
}
const _todayFmt = new Date().toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
const _dayName  = new Date().toLocaleDateString('en-GB', {weekday:'long'});

// ── WFH STATE ─────────────────────────────────────────────────
let _wfhMode = localStorage.getItem('miru_wfh') === 'true';

function _toggleWfh() {
  _wfhMode = !_wfhMode;
  localStorage.setItem('miru_wfh', _wfhMode);
  _updateWfhBtn();
  renderPersonalised();
}
function _updateWfhBtn() {
  var btn = document.getElementById('wfh-btn');
  if (!btn) return;
  btn.textContent = _wfhMode ? '🏠 WFH' : '🏢 Office';
  btn.classList.toggle('active', _wfhMode);
}

// ── WEATHER DATA ──────────────────────────────────────────────
const WX_CODES = {
  0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',
  45:'Foggy',48:'Freezing fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',
  61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',
  80:'Showers',81:'Heavy showers',95:'Thunderstorm',96:'Thunderstorm'
};

// ── INIT ──────────────────────────────────────────────────────
const tod = timeOfDay();
document.getElementById('hero-eyebrow').textContent = {morning:'Good morning', afternoon:'Good afternoon', evening:'Good evening', night:'Late night'}[tod] || 'Hello';
document.getElementById('hero-date').textContent    = _dayName;
document.getElementById('hero-sub').textContent     = PC_FMT ? PC_FMT + '  ·  ' + new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long'}) : new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long'});
_updateWfhBtn();

PC ? renderPersonalised() : renderBlank();

// ── ONBOARDING ────────────────────────────────────────────────
function renderBlank() {
  document.getElementById('content').innerHTML = `
    <div class="ob-wrap">
      <div class="ob-hero">
        <h2>Your UK life, briefed.</h2>
        <p>Trains · Fuel · Weather · Schools · Local intel</p>
      </div>
      <div class="ob-form">
        <div style="font-size:15px;font-weight:700;margin-bottom:18px">Set your postcode to get started</div>
        <label class="ob-label">Postcode</label>
        <input id="ob-pc" class="ob-input" type="text" placeholder="e.g. KT16 0HY" maxlength="8" autocomplete="postal-code"
          oninput="this.value=this.value.toUpperCase()">
        <label class="ob-label">Mobile <span style="font-weight:400;text-transform:none">(links your WhatsApp — optional)</span></label>
        <input id="ob-ph" class="ob-input" type="tel" placeholder="+44 7911 123456" autocomplete="tel">
        <button class="ob-btn" onclick="_obSubmit()">Get started →</button>
        <div id="ob-err" style="display:none;color:#f87171;font-size:12px;text-align:center;margin-top:10px"></div>
      </div>
    </div>`;
}

async function _obSubmit() {
  const pc  = (document.getElementById('ob-pc').value||'').trim().toUpperCase().replace(/\s/g,'');
  const ph  = (document.getElementById('ob-ph').value||'').trim().replace(/[\s\-\(\)]/g,'');
  const err = document.getElementById('ob-err');
  if (!pc || pc.length < 2) { err.textContent='Enter your postcode.'; err.style.display='block'; return; }
  err.style.display = 'none';
  const btn = document.querySelector('.ob-btn'); btn.textContent='Saving…'; btn.disabled=true;
  try {
    const ok = await fetch(`https://api.postcodes.io/postcodes/${pc}`);
    const d  = await ok.json();
    if (!d.result) { err.textContent='Postcode not found.'; err.style.display='block'; btn.textContent='Get started →'; btn.disabled=false; return; }
    localStorage.setItem('miru_postcode', pc);
    let phone = ph;
    if (/^07\d{9}$/.test(phone)) phone = '+44'+phone.slice(1);
    if (phone) localStorage.setItem('miru_phone', phone);
    if (phone) fetch('/api/myarea/home-postcode',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from_number:phone,postcode:pc})}).catch(()=>{});
    location.reload();
  } catch(e) { err.textContent='Something went wrong.'; err.style.display='block'; btn.textContent='Get started →'; btn.disabled=false; }
}

// ── PERSONALISED RENDER ───────────────────────────────────────
function renderPersonalised() {
  const wfh = _wfhMode;
  let html   = '';

  // Always: weather + trains
  html += `
    <div class="slabel">Weather<span class="slabel-more" onclick="nav('weather')">Forecast →</span></div>
    <div class="wx-hero" onclick="nav('weather')" id="wx-card">
      <div>
        <div class="wx-temp-big" id="wx-temp">—</div>
      </div>
      <div class="wx-right">
        <div class="wx-condition" id="wx-condition">Loading…</div>
        <div class="wx-feels" id="wx-feels"></div>
        <div class="wx-badge" id="wx-badge"></div>
      </div>
    </div>

    <div class="slabel">Trains<span class="slabel-more" onclick="nav('trains')">All departures →</span></div>
    <div class="trains-card" onclick="nav('trains')">
      <div class="train-header" id="train-station">Finding nearest station…</div>
      <div id="train-rows"><div class="train-row">
        <div class="train-time"><span class="skel" style="width:52px;height:1.1em"></span></div>
        <div class="train-dest"><span class="skel" style="width:140px;height:.9em;margin-bottom:4px"></span><span class="skel" style="width:90px;height:.8em"></span></div>
      </div></div>
    </div>`;

  // Morning: fuel + school + saves
  if (tod === 'morning') {
    html += `
      <div class="slabel">Fuel<span class="slabel-more" onclick="nav('fuel')">More stations →</span></div>
      <div class="fuel-card" onclick="nav('fuel')" id="fuel-card">
        <div>
          <div class="fuel-type-label">Petrol</div>
          <div class="fuel-price fuel-petrol" id="fuel-petrol"><span class="skel" style="width:70px;height:1.1em"></span></div>
          <div class="fuel-station" id="fuel-station">Finding station…</div>
        </div>
        <div class="fuel-divider"></div>
        <div>
          <div class="fuel-type-label">Diesel</div>
          <div class="fuel-price fuel-diesel" id="fuel-diesel">—</div>
        </div>
      </div>`;
  }

  // School messages always
  html += `
    <div class="slabel">School messages<span class="slabel-more" onclick="nav('saves')">All →</span></div>
    <div id="school-wrap"></div>`;

  // Saves strip
  html += `
    <div class="slabel">My saves<span class="slabel-more" onclick="nav('saves')">All →</span></div>
    <div class="saves-row" id="saves-row"><div class="save-chip" style="opacity:.4">Loading…</div></div>`;

  // Tools
  html += `
    <div class="slabel">Quick links</div>
    <div class="tool-grid">
      <div class="tool-card" onclick="nav('myarea')"><div class="tool-icon">📍</div><div class="tool-label">My Area</div><div class="tool-sub">Full local report</div></div>
      <div class="tool-card" onclick="nav('intel')"><div class="tool-icon">🏢</div><div class="tool-label">Intel</div><div class="tool-sub">Company research</div></div>
      <div class="tool-card" onclick="nav('music')"><div class="tool-icon">🎵</div><div class="tool-label">Music</div><div class="tool-sub">Charts & gigs</div></div>
      <div class="tool-card" onclick="nav('report')"><div class="tool-icon">🔍</div><div class="tool-label">Research Area</div><div class="tool-sub">Any postcode</div></div>
    </div>`;

  // Nearby
  html += `
    <div class="slabel">Nearby<span class="slabel-more" onclick="nav('places')">See all →</span></div>
    <div class="nearby-row" id="nearby-row">
      <div class="nearby-chip" style="opacity:.4"><div class="nearby-chip-icon">📍</div><div class="nearby-chip-name">Loading…</div></div>
    </div>`;

  document.getElementById('content').innerHTML = html;

  // Kick off data fetches
  _fetchWeather();
  _fetchTrains();
  if (tod === 'morning') _fetchFuel();
  _fetchSchoolMsgs();
  _fetchSaves();
  _fetchNearby();
}

// ── DATA: WEATHER ─────────────────────────────────────────────
function _fetchWeather() {
  fetch(`https://api.postcodes.io/postcodes/${PC}`)
    .then(r => r.json())
    .then(d => {
      const res = d.result||{};
      const lat = res.latitude, lon = res.longitude;
      if (!lat) return;
      return fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(3)}&longitude=${lon.toFixed(3)}&current=temperature_2m,weather_code,apparent_temperature&timezone=auto`);
    })
    .then(r => r && r.json())
    .then(wx => {
      if (!wx) return;
      const cur  = wx.current||{};
      const temp = Math.round(cur.temperature_2m??0);
      const feel = Math.round(cur.apparent_temperature??temp);
      const code = cur.weather_code??0;
      _el('wx-temp',      temp+'°');
      _el('wx-condition', WX_CODES[code]||'Clear');
      _el('wx-feels',     'Feels like '+feel+'°');
      _el('wx-badge',     feel < 5 ? '🧥 Very cold' : feel < 10 ? '🧥 Wrap up' : feel < 18 ? '🌤 Mild' : feel > 25 ? '☀ Warm' : '👍 Comfortable');
    })
    .catch(()=>{ _el('wx-condition','Weather unavailable'); });
}

// ── DATA: TRAINS (show 2) ─────────────────────────────────────
function _fetchTrains() {
  const el = document.getElementById('train-rows');
  const stnEl = document.getElementById('train-station');
  if (!el) return;

  fetch(`/api/train/nearest-by-postcode?postcode=${PC}`)
    .then(r => r.json())
    .then(data => {
      const crs  = data.crs;
      const name = data.name || crs;
      if (!crs) { if(stnEl) stnEl.textContent='No nearby station found'; el.innerHTML=''; return; }
      if (stnEl) stnEl.textContent = '🚆 ' + name;

      return fetch(`/api/train/departures?crs=${encodeURIComponent(crs)}`);
    })
    .then(r => r && r.json())
    .then(deps => {
      if (!deps || !el) return;
      const trains = deps.trains || [];
      if (!trains.length) { el.innerHTML = '<div class="train-row"><div style="font-size:13px;color:var(--muted);padding:4px 0">No departures found</div></div>'; return; }

      // Show next 2 trains
      el.innerHTML = trains.slice(0,2).map(t => {
        const late      = t.expected && t.expected !== 'On time' && !t.cancelled;
        const badgeCls  = t.cancelled ? 'tb-late' : late ? 'tb-late' : 'tb-ok';
        const badgeTxt  = t.cancelled ? 'Cancelled' : late ? t.expected : 'On time';
        const plat      = t.platform ? ' · Plat '+t.platform : '';
        return `<div class="train-row">
          <div class="train-time">${t.scheduled||'—'}</div>
          <div class="train-dest"><strong>${t.destination||'—'}</strong>${plat}</div>
          <span class="train-badge ${badgeCls}">${badgeTxt}</span>
        </div>`;
      }).join('');
    })
    .catch(()=>{ if(el) el.innerHTML='<div class="train-row" style="font-size:13px;color:var(--muted)">Train data unavailable</div>'; });
}

// ── DATA: FUEL ────────────────────────────────────────────────
function _fetchFuel() {
  if (!document.getElementById('fuel-petrol')) return;
  fetch(`/api/search?postcode=${PC}&fuel=petrol&radius=3&mode=fuel`)
    .then(r => r.json())
    .then(d => {
      const stations = d.stations||d.results||[];
      if (!stations.length) { _el('fuel-station','No stations found'); return; }
      const best = stations[0];
      const pp   = best.price ?? best.petrol_price ?? null;
      const name = best.name||best.brand||'Station';
      const dist = best.distance ? best.distance.toFixed(1)+' mi' : '';
      _el('fuel-petrol', pp ? pp.toFixed(1)+'p' : '—');
      _el('fuel-station', name + (dist ? ' · '+dist : ''));
      return fetch(`/api/search?postcode=${PC}&fuel=diesel&radius=3&mode=fuel`);
    })
    .then(r => r && r.json())
    .then(d => {
      if (!d) return;
      const s = d.stations||d.results||[];
      const dp = s.length ? (s[0].price ?? s[0].diesel_price ?? null) : null;
      _el('fuel-diesel', dp ? dp.toFixed(1)+'p' : '—');
    })
    .catch(()=>{ _el('fuel-station','Fuel data unavailable'); });
}

// ── DATA: SCHOOL MESSAGES ─────────────────────────────────────
function _fetchSchoolMsgs() {
  const el = document.getElementById('school-wrap');
  if (!el) return;
  fetch(`/api/school/poll?token=miru-digest-2026&days_back=7`)
    .then(r => r.json())
    .then(data => {
      const msgs = data.events || data.messages || [];
      if (!msgs.length) {
        el.innerHTML = '<div style="padding:0 20px 4px;font-size:13px;color:var(--muted)">No new school messages.</div>';
        return;
      }
      el.innerHTML = msgs.slice(0,3).map(m => {
        const urgent = /urgent|cancel|closure|emergency/i.test(m.title||m.subject||'');
        return `<div class="school-card">
          <div class="school-dot${urgent?' u':''}"></div>
          <div>
            <div class="school-title">${_esc(m.title||m.subject||'School update')}</div>
            <div class="school-body">${_esc((m.summary||m.body||'').slice(0,120))}${(m.summary||m.body||'').length>120?'…':''}</div>
            <div class="school-meta">${_esc(m.school_name||'')}${m.date?' · '+new Date(m.date).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}):''}</div>
          </div>
        </div>`;
      }).join('');
    })
    .catch(()=>{ el.innerHTML='<div style="padding:0 20px;font-size:13px;color:var(--muted)">School messages unavailable.</div>'; });
}

// ── DATA: SAVES ───────────────────────────────────────────────
function _fetchSaves() {
  const el = document.getElementById('saves-row');
  if (!el) return;
  const phone = PHONE;
  if (!phone) { el.innerHTML='<div class="save-chip" style="opacity:.4">Link WhatsApp to see saves</div>'; return; }
  fetch(`/api/wa/saves?from_number=${encodeURIComponent(phone)}&limit=10`)
    .then(r => r.json())
    .then(data => {
      const saves = data.saves||[];
      if (!saves.length) { el.innerHTML='<div class="save-chip" style="opacity:.4">No saves yet</div>'; return; }
      const icon = t => ({fuel:'⛽',train:'🚆',place:'📍',music:'🎵',note:'📝',intel:'🏢',food:'🍽'}[t]||'📌');
      el.innerHTML = saves.slice(0,8).map(s =>
        `<div class="save-chip" onclick="nav('saves')">${icon(s.save_type)} ${_esc((s.title||s.label||'Save').slice(0,28))}</div>`
      ).join('');
    })
    .catch(()=>{ el.innerHTML='<div class="save-chip" style="opacity:.4">Saves unavailable</div>'; });
}

// ── DATA: NEARBY ──────────────────────────────────────────────
function _fetchNearby() {
  const el = document.getElementById('nearby-row');
  if (!el) return;
  const timeout = new Promise(r => setTimeout(()=>r(null), 10000));
  Promise.race([fetch(`/api/your-area?postcode=${PC}`).then(r=>r.json()), timeout])
    .then(area => {
      if (!area||area.error) { el.innerHTML='<div class="nearby-chip" onclick="nav(\'myarea\')" style="opacity:.6"><div class="nearby-chip-icon">📍</div><div class="nearby-chip-name">Explore nearby</div></div>'; return; }
      const places = [];
      if (area.gps?.length)          places.push({icon:'🏥', name:area.gps[0].name,         dist:area.gps[0].distance_km});
      if (area.pharmacies?.length)   places.push({icon:'💊', name:area.pharmacies[0].name,   dist:area.pharmacies[0].distance_km});
      if (area.post_offices?.length) places.push({icon:'📮', name:area.post_offices[0].name, dist:area.post_offices[0].distance_km});
      if (area.pubs?.length)         places.push({icon:'🍺', name:area.pubs[0].name,         dist:area.pubs[0].distance_km});
      el.innerHTML = places.map(p =>
        `<div class="nearby-chip" onclick="nav('places')">
          <div class="nearby-chip-icon">${p.icon}</div>
          <div class="nearby-chip-name">${_esc(p.name)}</div>
          <div class="nearby-chip-dist">${p.dist?(+p.dist*0.621).toFixed(1)+' mi':'nearby'}</div>
        </div>`
      ).join('') || '<div class="nearby-chip" onclick="nav(\'myarea\')" style="opacity:.6"><div class="nearby-chip-icon">📍</div><div class="nearby-chip-name">Explore nearby</div></div>';
    })
    .catch(()=>{});
}

// ── HELPERS ───────────────────────────────────────────────────
function _el(id, text) { const e = document.getElementById(id); if (e) e.textContent = text; }
function _esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── NAV ───────────────────────────────────────────────────────
const _screenMap = { intel:'company', fuel:'fuel', trains:'trains', myarea:'myarea', places:'places', report:'report', music:'music', saves:'saves', weather:'myarea', whatsapp:'home' };
function nav(screen) {
  if (screen === 'home') return;
  const target = _screenMap[screen] || screen;
  const pcParam = PC ? '&pc='+encodeURIComponent(PC) : '';
  const usesPc  = ['trains','fuel','myarea','report'].includes(target);
  window.location.href = '/?screen='+target+(usesPc ? pcParam : '');
}

// ── PILL NAV ──────────────────────────────────────────────────
let _pillOpen = false;
function _pillTap(e) { if (!_pillOpen) _pillExpand(); }
function _pillExpand() { _pillOpen=true; document.getElementById('pill-shell').classList.add('expanded'); document.getElementById('pill-overlay').classList.add('show'); }
function _pillCollapse() { _pillOpen=false; document.getElementById('pill-shell').classList.remove('expanded'); document.getElementById('pill-overlay').classList.remove('show'); }
function _pillNav(name) {
  _pillCollapse();
  const labels={home:'Home',myarea:'My Area',intel:'Intel',saves:'Saves'}, icons={home:'🏠',myarea:'📍',intel:'🔍',saves:'📌'};
  ['home','myarea','intel','saves'].forEach(k=>document.getElementById('pi-'+k)?.classList.toggle('pi-active',k===name));
  document.getElementById('pill-icon').textContent  = icons[name]||'🏠';
  document.getElementById('pill-label').textContent = labels[name]||name;
  if (name !== 'home') nav(name);
}

// ── VOICE ─────────────────────────────────────────────────────
var _vRec=null, _vSyn=window.speechSynthesis||null, _vBusy=false;
function _voiceOpen() { document.getElementById('voice-overlay').classList.add('show'); _vState('idle'); }
function _voiceClose() { document.getElementById('voice-overlay').classList.remove('show'); if(_vRec){try{_vRec.abort()}catch(e){} _vRec=null;} if(_vSyn)_vSyn.cancel(); _vBusy=false; }
function _voiceOverlayTap(e) { if(e.target===document.getElementById('voice-overlay'))_voiceClose(); }
function _vState(s,x){
  var orb=document.getElementById('voice-orb'),st=document.getElementById('voice-status'),tr=document.getElementById('voice-transcript'),an=document.getElementById('voice-answer'),btn=document.getElementById('voice-mic-btn');
  orb.classList.remove('listening'); an.style.display='none';
  if(s==='idle'){orb.textContent='🎤';st.textContent='Tap to ask anything';tr.textContent='e.g. "Next train from Longcross?"';btn.textContent='🎤 Ask';btn.disabled=false;}
  else if(s==='listening'){orb.textContent='🎤';orb.classList.add('listening');st.textContent='Listening…';tr.textContent='';btn.textContent='⏹ Stop';btn.disabled=false;}
  else if(s==='thinking'){orb.textContent='⏳';st.textContent='Thinking…';tr.textContent=x||'';btn.textContent='🎤 Ask';btn.disabled=true;}
  else if(s==='answer'){orb.textContent='✅';st.textContent='Here you go';tr.textContent=x.q||'';an.textContent=x.a||'';an.style.display='block';btn.textContent='🎤 Ask again';btn.disabled=false;}
  else if(s==='error'){orb.textContent='❌';st.textContent='Something went wrong';tr.textContent=x||'';btn.textContent='🎤 Try again';btn.disabled=false;}
}
function _voiceListen(){
  if(_vBusy){if(_vRec){try{_vRec.stop()}catch(e){}} return;}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){_vState('error','Voice not supported — try Chrome');return;}
  _vBusy=true; _vState('listening');
  var rec=new SR(); _vRec=rec; rec.lang='en-GB'; rec.interimResults=true; rec.maxAlternatives=1;
  rec.onresult=function(e){var t=e.results[0][0].transcript; document.getElementById('voice-transcript').textContent=t; if(e.results[0].isFinal){rec.stop();_vSubmit(t);}};
  rec.onerror=function(e){_vBusy=false;if(e.error==='no-speech')_vState('idle');else _vState('error','Mic error: '+e.error);};
  rec.onend=function(){_vBusy=false;};
  rec.start();
}
async function _vSubmit(q){
  _vState('thinking','"'+q+'"');
  try{
    var r=await fetch('/api/voice-query',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q,postcode:PC,phone:PHONE})});
    var d=await r.json();
    if(d.error){_vState('error',d.error);return;}
    _vState('answer',{q:'"'+q+'"',a:d.answer});
    if(_vSyn&&d.answer){_vSyn.cancel();var u=new SpeechSynthesisUtterance(d.answer);u.lang='en-GB';u.rate=0.95;_vSyn.speak(u);}
  }catch(e){_vState('error','Network error');}
}

let _tt;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';clearTimeout(_tt);_tt=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';},1400);}
</script>
