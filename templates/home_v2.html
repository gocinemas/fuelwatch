<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Miru</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── TOKENS ── */
:root {
  --bg:      #060810;
  --glass:   rgba(255,255,255,.06);
  --glass2:  rgba(255,255,255,.03);
  --border:  rgba(255,255,255,.08);
  --text:    #f0f0f6;
  --muted:   #484854;
  --muted2:  #888898;
  --accent:  #22c55e;
  --r:       20px;
  --pad:     16px;
}
[data-theme="light"] {
  --bg:      #edeae4;
  --glass:   rgba(255,255,255,.78);
  --glass2:  rgba(255,255,255,.5);
  --border:  rgba(0,0,0,.08);
  --text:    #0e0e12;
  --muted:   #999;
  --muted2:  #666;
}
@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]):not([data-theme="light"]) {
    --bg:#edeae4; --glass:rgba(255,255,255,.78); --glass2:rgba(255,255,255,.5);
    --border:rgba(0,0,0,.08); --text:#0e0e12; --muted:#999; --muted2:#666;
  }
}

body {
  background: var(--bg);
  background-image: radial-gradient(ellipse 900px 500px at 50% -60px, rgba(96,165,250,.08), transparent 65%);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
  min-height: 100dvh; overflow-x: hidden;
}

.page { max-width: 480px; margin: 0 auto; padding-bottom: 110px; }

/* ── TOP BAR ── */
.top-bar {
  display: flex; align-items: center; justify-content: flex-end; gap: 8px;
  padding: calc(env(safe-area-inset-top, 0px) + 14px) var(--pad) 0;
}
.theme-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--glass); border: 1px solid var(--border);
  font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; flex-shrink: 0; color: var(--muted2);
  transition: background .15s;
}
.theme-btn:active { background: var(--glass2); }
.wfh-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 30px; padding: 7px 12px; cursor: pointer;
  font-size: 11px; font-weight: 600; color: var(--muted);
  -webkit-tap-highlight-color: transparent; transition: all .2s; letter-spacing: .2px;
}
.wfh-pill.active { border-color: rgba(34,197,94,.35); color: #16a34a; }
[data-theme="dark"] .wfh-pill.active,
html:not([data-theme="light"]) .wfh-pill.active { color: #4ade80; }
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) .wfh-pill.active { color: #4ade80; }
}

/* ── WEATHER HERO (full-bleed) ── */
.wx-hero {
  position: relative; overflow: hidden;
  min-height: 220px;
  margin: 12px var(--pad) 0;
  border-radius: 28px;
  padding: 20px 22px 22px;
  display: flex; flex-direction: column; justify-content: space-between;
  cursor: pointer;
  transition: filter .4s;
}
/* Readability veil */
.wx-hero::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,.08) 0%, rgba(0,0,0,.28) 100%);
  border-radius: inherit; pointer-events: none;
}
/* Sky states */
.wx-hero.sky-sunny  { background: linear-gradient(155deg,#1a5c2e,#0c3a1c,#061e0e); }
.wx-hero.sky-clear  { background: linear-gradient(155deg,#1a3d78,#0c2554,#070e2e); }
.wx-hero.sky-cloud  { background: linear-gradient(155deg,#1e2840,#13192e,#080c1a); }
.wx-hero.sky-rain   { background: linear-gradient(155deg,#162030,#0c1520,#060c14); }
.wx-hero.sky-snow   { background: linear-gradient(155deg,#1e2a40,#1a2448,#10182e); }
.wx-hero.sky-storm  { background: linear-gradient(155deg,#14101e,#0c0818,#06040e); }
.wx-hero.sky-night  { background: linear-gradient(155deg,#08081e,#06061a,#030310); }
.wx-hero.sky-fog    { background: linear-gradient(155deg,#181c28,#111520,#080c14); }

/* Greeting eyebrow */
.wx-eyebrow {
  position: relative; z-index: 1;
  display: flex; align-items: center; gap: 10px;
}
.wx-greeting {
  font-size: 10px; font-weight: 800; letter-spacing: 1.8px; text-transform: uppercase;
  color: rgba(255,255,255,.5);
}
.wx-date-str { font-size: 10px; color: rgba(255,255,255,.3); }

/* Main weather content */
.wx-body {
  position: relative; z-index: 1;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
}
.wx-left { display: flex; flex-direction: column; gap: 6px; }
.wx-temp {
  font-size: 92px; font-weight: 900; letter-spacing: -6px;
  color: #fff; line-height: 0.88;
  text-shadow: 0 4px 24px rgba(0,0,0,.4);
}
.wx-cond  { font-size: 17px; font-weight: 700; color: rgba(255,255,255,.9); }
.wx-feels { font-size: 12px; color: rgba(255,255,255,.55); margin-top: 1px; }
.wx-badge {
  display: inline-flex; align-items: center; align-self: flex-start;
  font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 20px;
  background: rgba(255,255,255,.15); color: rgba(255,255,255,.9);
}
.wx-icon { width: 72px; height: 72px; position: relative; flex-shrink: 0; }

/* ── DATA ROW ── */
.data-row {
  display: grid; gap: 10px;
  padding: 10px var(--pad) 0;
}
.data-row.has-fuel  { grid-template-columns: 3fr 2fr; }
.data-row.no-fuel   { grid-template-columns: 1fr; }

/* ── GLASS CARD ── */
.g-card {
  background: var(--glass); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 16px;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: background .15s;
}
.g-card:active { background: var(--glass2); }

.card-label {
  font-size: 9px; font-weight: 800; letter-spacing: 1.6px; text-transform: uppercase;
  color: var(--muted2); display: block; margin-bottom: 2px;
}
.card-sub {
  font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: .3px;
  margin-bottom: 10px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── TRAINS ── */
.train-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.train-row:last-child { border-bottom: none; padding-bottom: 0; }
.train-time {
  font-size: 26px; font-weight: 900; letter-spacing: -1.5px;
  color: #818cf8; line-height: 1; flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}
.train-dest { flex: 1; min-width: 0; }
.train-dest strong { font-size: 12px; font-weight: 700; color: var(--text); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.train-dest span   { font-size: 10px; color: var(--muted2); }
.train-badge {
  font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 10px; flex-shrink: 0; white-space: nowrap;
}
.tb-ok   { background: rgba(34,197,94,.12);  color: #4ade80; }
.tb-late { background: rgba(239,68,68,.12);  color: #f87171; }

/* ── FUEL ── */
.fuel-cols { display: flex; flex-direction: column; gap: 10px; margin-top: 2px; }
.fuel-col {}
.fuel-lbl { font-size: 8px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 1px; }
.fuel-num {
  font-size: 32px; font-weight: 900; letter-spacing: -2px; line-height: 1;
  font-variant-numeric: tabular-nums;
}
.fuel-p { color: #fbbf24; }
.fuel-d { color: #f97316; }
.fuel-sta { font-size: 10px; color: var(--muted); margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── WEEKEND GRID ── */
.wk-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 8px;
  padding: 10px var(--pad) 0;
}
.wk-pill {
  background: var(--glass); border: 1px solid var(--border);
  border-radius: 18px; padding: 16px 10px 14px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: background .15s; text-decoration: none;
}
.wk-pill:active { background: var(--glass2); }
.wk-pill-icon { font-size: 26px; line-height: 1; }
.wk-pill-label { font-size: 11px; font-weight: 700; color: var(--muted2); }

/* ── SCHOOL ── */
.school-wrap { padding: 10px var(--pad) 0; }
.school-section-label {
  font-size: 9px; font-weight: 800; letter-spacing: 1.6px; text-transform: uppercase;
  color: var(--muted2); margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between;
}
.school-section-label span { font-size: 11px; font-weight: 500; letter-spacing: 0; text-transform: none; color: var(--muted); cursor: pointer; }
.school-card {
  background: var(--glass); border: 1px solid var(--border);
  border-radius: 16px; padding: 13px 14px;
  display: flex; gap: 11px; align-items: flex-start; margin-bottom: 8px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.school-card.urgent { border-color: rgba(248,113,113,.25); background: rgba(248,113,113,.06); }
.school-left { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; margin-top: 1px; }
.school-dot { width: 8px; height: 8px; border-radius: 50%; background: #fbbf24; }
.school-dot.u { background: #f87171; }
.school-title { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.3; }
.school-body  { font-size: 12px; color: var(--muted2); margin-top: 3px; line-height: 1.5; }
.school-meta  { font-size: 10px; color: var(--muted); margin-top: 4px; display: flex; align-items: center; gap: 6px; }
.school-tag   { background: rgba(251,191,36,.12); color: #fbbf24; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 8px; letter-spacing: .3px; }
.school-tag.urgent-tag { background: rgba(248,113,113,.12); color: #f87171; }

/* ── QUICK ACTIONS ── */
.action-row {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  padding: 10px var(--pad) 0;
}
.action-tile {
  background: var(--glass); border: 1px solid var(--border);
  border-radius: 18px; padding: 16px 8px 14px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background .15s;
}
.action-tile:active { background: var(--glass2); }
.at-icon  { font-size: 22px; line-height: 1; }
.at-label { font-size: 10px; font-weight: 700; color: var(--muted2); text-align: center; }

/* ── SAVES ── */
.saves-wrap { padding: 12px var(--pad) 0; }
.saves-label { font-size: 9px; font-weight: 800; letter-spacing: 1.6px; text-transform: uppercase; color: var(--muted2); margin-bottom: 8px; }
.saves-row { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.saves-row::-webkit-scrollbar { display: none; }
.save-chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--glass); border: 1px solid var(--border);
  border-radius: 22px; padding: 9px 14px;
  font-size: 12px; font-weight: 600; color: var(--text);
  white-space: nowrap; flex-shrink: 0; cursor: pointer;
}

/* ── ONBOARDING ── */
.ob-wrap { padding: 28px var(--pad); }
.ob-hero {
  background: linear-gradient(145deg,#0d3a1e,#061e0e);
  border: 1px solid rgba(34,197,94,.15);
  border-radius: var(--r); padding: 28px 22px; margin-bottom: 14px;
}
.ob-hero h2 { font-size: 28px; font-weight: 900; color: #fff; letter-spacing: -1px; margin-bottom: 8px; }
.ob-hero p  { font-size: 13px; color: rgba(255,255,255,.55); line-height: 1.6; }
.ob-form { background: var(--glass); border: 1px solid var(--border); border-radius: var(--r); padding: 22px; }
.ob-label { font-size: 10px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase; color: var(--muted2); display: block; margin-bottom: 6px; }
.ob-input {
  width: 100%; padding: 13px 14px; border: 1.5px solid var(--border);
  border-radius: 12px; font-size: 16px; font-family: inherit;
  background: var(--glass2); color: var(--text); outline: none; margin-bottom: 12px;
}
.ob-input:focus { border-color: var(--accent); }
.ob-btn {
  width: 100%; padding: 15px; background: linear-gradient(135deg,#22c55e,#16a34a);
  color: #fff; font-size: 15px; font-weight: 800; border: none;
  border-radius: 14px; cursor: pointer;
}

/* ── WEATHER ICON ELEMENTS ── */
.wx-sun { position:absolute; width:28px; height:28px; border-radius:50%; background:#fbbf24; top:50%; left:50%; transform:translate(-50%,-50%); box-shadow:0 0 14px 5px rgba(251,191,36,.4); animation:wx-pulse 3s ease-in-out infinite; }
.wx-rays { position:absolute; inset:0; animation:wx-spin 10s linear infinite; }
.wx-ray  { position:absolute; left:50%; top:2px; width:2px; height:8px; background:#fbbf24; border-radius:2px; transform-origin:50% 30px; opacity:.7; }
@keyframes wx-pulse { 0%,100%{box-shadow:0 0 14px 5px rgba(251,191,36,.4)} 50%{box-shadow:0 0 22px 8px rgba(251,191,36,.15)} }
@keyframes wx-spin  { to{transform:rotate(360deg)} }
.wx-moon { position:absolute; width:30px; height:30px; background:#fde68a; border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%); box-shadow:0 0 14px 4px rgba(253,230,138,.25); }
.wx-moon::after { content:''; position:absolute; width:22px; height:22px; background:#08081e; border-radius:50%; top:-4px; right:-6px; }
.wx-cloud-body { position:absolute; bottom:14px; left:6px; right:6px; height:20px; background:#94a3b8; border-radius:12px; }
.wx-cloud-body::before { content:''; position:absolute; width:18px; height:18px; background:#94a3b8; border-radius:50%; top:-10px; left:8px; }
.wx-cloud-body::after  { content:''; position:absolute; width:13px; height:13px; background:#94a3b8; border-radius:50%; top:-7px; left:23px; }
.wx-part-sun { position:absolute; top:4px; right:4px; width:26px; height:26px; background:#fbbf24; border-radius:50%; box-shadow:0 0 10px rgba(251,191,36,.5); }
.wx-part-cloud { position:absolute; bottom:10px; left:4px; right:4px; height:18px; background:#94a3b8; border-radius:10px; }
.wx-part-cloud::before { content:''; position:absolute; width:16px; height:16px; background:#94a3b8; border-radius:50%; top:-8px; left:6px; }
.wx-part-cloud::after  { content:''; position:absolute; width:11px; height:11px; background:#94a3b8; border-radius:50%; top:-5px; left:20px; }
.wx-rain-cloud { position:absolute; top:6px; left:4px; right:4px; height:22px; background:#6b7280; border-radius:12px; }
.wx-rain-cloud::before { content:''; position:absolute; width:18px; height:18px; background:#6b7280; border-radius:50%; top:-10px; left:6px; }
.wx-rain-cloud::after  { content:''; position:absolute; width:14px; height:14px; background:#6b7280; border-radius:50%; top:-7px; left:22px; }
.wx-drops { position:absolute; bottom:6px; left:0; right:0; display:flex; justify-content:center; gap:6px; }
.wx-drop  { width:2px; height:8px; background:#60a5fa; border-radius:2px; animation:wx-fall 1.1s ease-in infinite; }
.wx-drop:nth-child(2){animation-delay:.25s} .wx-drop:nth-child(3){animation-delay:.5s} .wx-drop:nth-child(4){animation-delay:.75s}
@keyframes wx-fall { 0%{transform:translateY(-4px);opacity:.9} 100%{transform:translateY(10px);opacity:0} }
.wx-heavydrop { width:2px; height:10px; background:#93c5fd; border-radius:2px; animation:wx-fall .8s ease-in infinite; }
.wx-heavydrop:nth-child(2){animation-delay:.15s} .wx-heavydrop:nth-child(3){animation-delay:.3s} .wx-heavydrop:nth-child(4){animation-delay:.45s} .wx-heavydrop:nth-child(5){animation-delay:.6s}
.wx-snow-cloud { position:absolute; top:6px; left:4px; right:4px; height:22px; background:#64748b; border-radius:12px; }
.wx-snow-cloud::before { content:''; position:absolute; width:18px; height:18px; background:#64748b; border-radius:50%; top:-10px; left:6px; }
.wx-snow-cloud::after  { content:''; position:absolute; width:14px; height:14px; background:#64748b; border-radius:50%; top:-7px; left:22px; }
.wx-flakes { position:absolute; bottom:4px; left:0; right:0; display:flex; justify-content:center; gap:8px; }
.wx-flake  { font-size:12px; animation:wx-drift 2s ease-in-out infinite; }
.wx-flake:nth-child(2){animation-delay:.6s} .wx-flake:nth-child(3){animation-delay:1.2s}
@keyframes wx-drift { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(4px) rotate(20deg)} }
.wx-storm-cloud { position:absolute; top:4px; left:4px; right:4px; height:24px; background:#374151; border-radius:12px; }
.wx-storm-cloud::before { content:''; position:absolute; width:20px; height:20px; background:#374151; border-radius:50%; top:-12px; left:6px; }
.wx-storm-cloud::after  { content:''; position:absolute; width:15px; height:15px; background:#374151; border-radius:50%; top:-8px; left:24px; }
.wx-bolt { position:absolute; bottom:2px; left:50%; transform:translateX(-50%); font-size:20px; animation:wx-flash 2s ease-in-out infinite; }
@keyframes wx-flash { 0%,90%,100%{opacity:1} 95%{opacity:.1} }
.wx-fog-lines { position:absolute; inset:12px 6px; display:flex; flex-direction:column; justify-content:space-between; }
.wx-fog-line  { height:4px; background:rgba(148,163,184,.5); border-radius:2px; animation:wx-fog-shift 3s ease-in-out infinite; }
.wx-fog-line:nth-child(2){animation-delay:.5s;width:80%;margin-left:10%} .wx-fog-line:nth-child(3){animation-delay:1s;width:70%;margin-left:5%}
@keyframes wx-fog-shift { 0%,100%{opacity:.5;transform:translateX(0)} 50%{opacity:.9;transform:translateX(4px)} }

/* ── SKELETON ── */
.skel { background:linear-gradient(90deg,var(--glass2) 25%,var(--glass) 50%,var(--glass2) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:6px; display:block; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── PILL NAV ── */
#pill-overlay { display:none; position:fixed; inset:0; z-index:200; }
#pill-overlay.show { display:block; }
#pill-nav { position:fixed; bottom:calc(20px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); z-index:300; }
#pill-shell {
  display:flex; align-items:center; justify-content:center;
  background:rgba(12,12,20,.96); backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border:1px solid var(--border); border-radius:30px; height:46px; width:150px;
  overflow:hidden; position:relative; cursor:pointer;
  transition:width .38s cubic-bezier(.34,1.56,.64,1); box-shadow:0 8px 32px rgba(0,0,0,.5);
}
#pill-shell.expanded { width:264px; }
#pill-resting { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; gap:6px; opacity:1; transition:opacity .2s; pointer-events:auto; padding:0 16px; white-space:nowrap; }
#pill-shell.expanded #pill-resting { opacity:0; pointer-events:none; }
.pr-label { font-size:14px; font-weight:600; color:var(--text); }
.pr-chev { width:14px; height:14px; stroke:var(--muted); fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; transition:transform .3s; flex-shrink:0; }
#pill-shell.expanded .pr-chev { transform:rotate(180deg); }
#pill-icons { position:absolute; inset:0; display:flex; align-items:center; justify-content:space-around; padding:0 8px; opacity:0; transition:opacity .18s ease .1s; pointer-events:none; }
#pill-shell.expanded #pill-icons { opacity:1; pointer-events:auto; }
.pi-btn { display:flex; flex-direction:column; align-items:center; gap:4px; background:none; border:none; cursor:pointer; color:var(--muted); padding:6px 10px; border-radius:12px; transition:color .15s; }
.pi-btn.pi-active { color:var(--text); }
.pi-icon { font-size:20px; line-height:1; }
.pi-dot { width:4px; height:4px; border-radius:50%; background:var(--accent); opacity:0; transition:opacity .2s; }
.pi-btn.pi-active .pi-dot { opacity:1; }

#toast {
  position:fixed; bottom:130px; left:50%; transform:translateX(-50%) translateY(10px);
  background:var(--glass); border:1px solid var(--border); border-radius:12px;
  padding:8px 18px; font-size:13px; font-weight:600;
  opacity:0; transition:opacity .2s,transform .2s; pointer-events:none;
  white-space:nowrap; z-index:400;
  backdrop-filter:blur(20px);
}
</style>
</head>
<body>
<div class="page">
  <!-- Top controls -->
  <div class="top-bar">
    <button class="theme-btn" id="theme-btn" onclick="_cycleTheme()">⚙️</button>
    <button class="wfh-pill" id="wfh-btn" onclick="_toggleWfh()" style="${isWeekend?'display:none':''}">🏢 Office</button>
  </div>

  <div id="content"></div>
</div>

<!-- PILL NAV -->
<div id="pill-overlay" onclick="_pillCollapse()"></div>
<div id="pill-nav">
  <div id="pill-shell" onclick="_pillTap(event)">
    <div id="pill-resting">
      <span style="font-size:18px" id="pill-icon">🏠</span>
      <span class="pr-label" id="pill-label">Home</span>
      <svg class="pr-chev" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>

<script>
// ── IDENTITY ──────────────────────────────────────────────────
(function(){
  var p = new URLSearchParams(location.search);
  var pc = (p.get('pc')||p.get('postcode')||'').replace(/\s+/g,'').toUpperCase();
  var ph = p.get('phone')||'';
  if (pc && !localStorage.getItem('miru_postcode')) localStorage.setItem('miru_postcode', pc);
  if (ph && !localStorage.getItem('miru_phone'))    localStorage.setItem('miru_phone', ph);
  if (p.get('preview') === 'miru2026' && !localStorage.getItem('miru_postcode'))
    localStorage.setItem('miru_postcode', 'KT160HY');
})();

const PC     = (localStorage.getItem('miru_postcode')||'').replace(/\s+/g,'').toUpperCase();
const PC_FMT = PC.length > 4 ? PC.slice(0,-3)+' '+PC.slice(-3) : PC;
const PHONE  = localStorage.getItem('miru_phone')||'';

// ── TIME ──────────────────────────────────────────────────────
function hour() { return new Date().getHours(); }
function timeOfDay() {
  const h = hour();
  if (h >= 5  && h < 11) return 'morning';
  if (h >= 11 && h < 17) return 'afternoon';
  if (h >= 17 && h < 22) return 'evening';
  return 'night';
}
const _todayFmt  = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
const _dayName   = new Date().toLocaleDateString('en-GB',{weekday:'long'});
const isWeekend  = [0,6].includes(new Date().getDay()); // 0=Sun,6=Sat
const _MIRU_WA   = '14155238886';

// ── WFH ───────────────────────────────────────────────────────
let _wfhMode = localStorage.getItem('miru_wfh') === 'true';
function _toggleWfh() {
  _wfhMode = !_wfhMode;

}
function _updateWfhBtn() {
  var btn = document.getElementById('wfh-btn');

// ── THEME ─────────────────────────────────────────────────────
let _themeMode = localStorage.getItem('miru_theme') || 'system';
const _THEME_ICONS  = { dark:'🌙', light:'☀️', system:'⚙️' };
const _THEME_CYCLE  = { system:'dark', dark:'light', light:'system' };
function _applyTheme() {
  const el = document.documentElement, btn = document.getElementById('theme-btn');
  _themeMode === 'system' ? el.removeAttribute('data-theme') : el.setAttribute('data-theme', _themeMode);

  _themeMode = _THEME_CYCLE[_themeMode] || 'system';
  localStorage.setItem('miru_theme', _themeMode);
  _applyTheme();
}

// ── WEATHER DATA ──────────────────────────────────────────────
const WX_CODES = {
  0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',
  45:'Foggy',48:'Freezing fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',
  61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',

};

// ── INIT ──────────────────────────────────────────────────────
_applyTheme();
_updateWfhBtn();
PC ? renderPersonalised() : renderBlank();

// ── ONBOARDING ────────────────────────────────────────────────

      <div class="ob-hero">

}

async function _obSubmit() {
  const pc  = (document.getElementById('ob-pc').value||'').trim().toUpperCase().replace(/\s/g,'');
  const ph  = (document.getElementById('ob-ph').value||'').trim().replace(/[\s\-\(\)]/g,'');
  const err = document.getElementById('ob-err');
  if (!pc || pc.length < 2) { err.textContent='Enter your postcode.'; err.style.display='block'; return; }
  err.style.display='none';
  const btn = document.querySelector('.ob-btn'); btn.textContent='Saving…'; btn.disabled=true;
  try {
    const ok = await fetch(`https://api.postcodes.io/postcodes/${pc}`);
    const d  = await ok.json();
    if (!d.result) { err.textContent='Postcode not found.'; err.style.display='block'; btn.textContent='Get started →'; btn.disabled=false; return; }
    localStorage.setItem('miru_postcode', pc);
    let phone = ph;
    if (/^07\d{9}$/.test(phone)) phone='+44'+phone.slice(1);
    if (phone) localStorage.setItem('miru_phone', phone);
    if (phone) fetch('/api/myarea/home-postcode',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from_number:phone,postcode:pc})}).catch(()=>{});
    location.reload();
  } catch(e) { err.textContent='Something went wrong.'; err.style.display='block'; btn.textContent='Get started →'; btn.disabled=false; }
}

      <div class="wk-pill" onclick="nav('myarea')">
        <span class="wk-pill-icon">📅</span>

      <div class="g-card" onclick="nav('trains')">

        <span class="card-sub" id="train-station">Finding station…</span>

          <div class="train-row">
            <div class="train-time"><span class="skel" style="width:54px;height:1em;display:block"></span></div>
            <div class="train-dest"><span class="skel" style="width:100px;height:.9em;margin-bottom:4px;display:block"></span></div>
          </div>

      <div class="saves-label" style="display:flex;justify-content:space-between;align-items:center">
        <span>Saved</span>

// ── WEATHER ICON HELPERS ──────────────────────────────────────
function wxSkyClass(code, h) {
  const night = h < 6 || h >= 20;
  if (night && code <= 1) return 'sky-night';
  if (code <= 1)          return 'sky-sunny';
  if (code <= 3)          return 'sky-cloud';
  if (code <= 48)         return 'sky-fog';
  if (code <= 67)         return 'sky-rain';
  if (code <= 77)         return 'sky-snow';
  if (code >= 95)         return 'sky-storm';
  return 'sky-cloud';
}

function wxIconHtml(code, h) {
  const night = h < 6 || h >= 20;
  const rays = [0,45,90,135,180,225,270,315].map(d=>`<div class="wx-ray" style="transform:rotate(${d}deg) translateX(-50%)"></div>`).join('');
  if (code <= 1) { return night ? `<div class="wx-moon"></div>` : `<div class="wx-sun"></div><div class="wx-rays">${rays}</div>`; }
  if (code <= 2) { return night ? `<div class="wx-moon" style="top:8px;right:8px;width:22px;height:22px"></div><div class="wx-part-cloud"></div>` : `<div class="wx-part-sun"></div><div class="wx-part-cloud"></div>`; }
  if (code === 3) return `<div class="wx-cloud-body"></div>`;
  if (code <= 48) return `<div class="wx-fog-lines"><div class="wx-fog-line"></div><div class="wx-fog-line"></div><div class="wx-fog-line"></div></div>`;
  if (code <= 57) return `<div class="wx-rain-cloud"></div><div class="wx-drops"><div class="wx-drop"></div><div class="wx-drop"></div><div class="wx-drop"></div></div>`;
  if (code <= 67) return `<div class="wx-rain-cloud"></div><div class="wx-drops"><div class="wx-heavydrop"></div><div class="wx-heavydrop"></div><div class="wx-heavydrop"></div><div class="wx-heavydrop"></div><div class="wx-heavydrop"></div></div>`;
  if (code <= 77) return `<div class="wx-snow-cloud"></div><div class="wx-flakes"><div class="wx-flake">❄</div><div class="wx-flake">❄</div><div class="wx-flake">❄</div></div>`;
  if (code <= 82) return `<div class="wx-rain-cloud"></div><div class="wx-drops"><div class="wx-drop"></div><div class="wx-drop"></div><div class="wx-drop"></div><div class="wx-drop"></div></div>`;
  return `<div class="wx-storm-cloud"></div><div class="wx-bolt">⚡</div>`;
}

function _wxApply(code, h, condition, feels, badge) {
  const iconEl = document.getElementById('wx-icon');
  const card   = document.getElementById('wx-card');
  if (iconEl) iconEl.innerHTML = wxIconHtml(code, h);
  if (card)   { card.className = 'wx-hero ' + wxSkyClass(code, h); card.onclick = ()=>nav('weather'); }
  _el('wx-condition', condition);
  _el('wx-feels',     feels);
  _el('wx-badge',     badge);
}

// ── DATA: WEATHER ─────────────────────────────────────────────
async function _fetchWeather() {
  try {
    const pcRes = await fetch(`https://api.postcodes.io/postcodes/${PC}`);
    const pcData = await pcRes.json();
    const res = pcData.result || {};
    const lat = res.latitude, lon = res.longitude;
    if (!lat || !lon) { _el('wx-condition','Set postcode to see weather'); return; }
    const wxRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}&current=temperature_2m,weather_code,apparent_temperature&timezone=auto`);
    const wx    = await wxRes.json();
    const cur   = wx.current || {};
    const temp  = Math.round(cur.temperature_2m ?? 0);
    const feel  = Math.round(cur.apparent_temperature ?? temp);
    const code  = cur.weather_code ?? 0;
    const h     = hour();
    const badge = feel<0?'🥶 Freezing':feel<5?'🧥 Very cold':feel<10?'🧥 Wrap up':feel<18?'🌤 Mild':feel>28?'🔥 Hot':feel>23?'☀ Warm':'👍 Comfortable';
    const condition = WX_CODES[code] || 'Clear';
    _el('wx-temp', temp+'°');
    _wxApply(code, h, condition, 'Feels like '+feel+'°', badge);
  } catch(e) { _el('wx-condition','Weather unavailable'); }
}

// ── DATA: TRAINS ──────────────────────────────────────────────
function _minsTo(timeStr) {
  if (!timeStr || timeStr === '—') return null;
  const [h, m] = timeStr.split(':').map(Number);
  if (isNaN(h) || isNaN(m)) return null;
  const now = new Date(), dep = new Date(now);
  dep.setHours(h, m, 0, 0);
  if (dep <= now) dep.setDate(dep.getDate() + 1);
  const diff = Math.round((dep - now) / 60000);
  return diff <= 0 ? 'Now' : diff + ' min';
}

function _renderTrainDeps(deps, el) {
  if (!deps || !el) return;
  const trains = deps.trains || [];
  if (!trains.length) { el.innerHTML='<div class="train-row" style="font-size:12px;color:var(--muted);padding:6px 0">No departures found</div>'; return; }
  el.innerHTML = trains.slice(0,2).map(t=>{
    const late=t.expected&&t.expected!=='On time'&&!t.cancelled;
    const cls=t.cancelled?'tb-late':late?'tb-late':'tb-ok';
    const mins=_minsTo(t.scheduled);
    const txt=t.cancelled?'Cancelled':late?t.expected:(mins||'On time');
    const plat=t.platform?' · Plat '+t.platform:'';
    return `<div class="train-row">
      <div class="train-time">${t.scheduled||'—'}</div>
      <div class="train-dest"><strong>${t.destination||'—'}</strong><span>${plat}</span></div>
      <span class="train-badge ${cls}">${txt}</span>
    </div>`;
  }).join('');
}

function _fetchTrains() {
  const el = document.getElementById('train-rows');
  const stnEl = document.getElementById('train-station');
  if (!el) return;

  // Both modes fetch from home station — direction filter changes per mode
  fetch(`/api/train/nearest-by-postcode?postcode=${PC}`)
    .then(r=>r.json())
    .then(data=>{
      const crs = data.crs || '';
      const name = data.name || crs;
      if (!crs) { if(stnEl) stnEl.textContent='No nearby station'; el.innerHTML=''; return null; }
      if (!_wfhMode) {
        // Office mode: at Waterloo, want trains home → show Reading-bound trains at LNG (from WAT)
        if (stnEl) stnEl.textContent = '🚆 Waterloo → '+name;
      } else {
        // WFH mode: at home, want trains to Waterloo → show Waterloo-bound trains at LNG
        if (stnEl) stnEl.textContent = '🚆 '+name+' → Waterloo';
      }
      return fetch(`/api/train/departures?crs=${encodeURIComponent(crs)}`);
    })
    .then(r=>r&&r.json())
    .then(deps=>{
      if (!deps) return;
      if (deps.trains) {
        if (!_wfhMode) {
          // Office: trains from Waterloo direction = those NOT going to Waterloo (heading to Reading)
          deps.trains = deps.trains.filter(t=>!(t.destination||'').toLowerCase().includes('waterloo'));
        } else {
          // WFH: trains going to Waterloo
          deps.trains = deps.trains.filter(t=>(t.destination||'').toLowerCase().includes('waterloo'));
        }
      }
      _renderTrainDeps(deps, el);
    })
    .catch(()=>{ if(el) el.innerHTML='<div class="train-row" style="font-size:12px;color:var(--muted)">Train data unavailable</div>'; });
}

// ── DATA: FUEL ────────────────────────────────────────────────
function _fetchFuel() {
  if (!document.getElementById('fuel-petrol')) return;
  fetch(`/api/search?postcode=${PC}&fuel=petrol&radius=3&mode=fuel`)
    .then(r=>r.json())
    .then(d=>{
      const s=d.stations||d.results||[];
      if (!s.length) { _el('fuel-station','No stations found'); return; }
      const best=s[0];
      const pp=best.price??best.petrol_price??null;
      _el('fuel-petrol', pp?pp.toFixed(1)+'p':'—');
      _el('fuel-station', (best.name||best.brand||'Station')+(best.distance?' · '+best.distance.toFixed(1)+' mi':''));
      return fetch(`/api/search?postcode=${PC}&fuel=diesel&radius=3&mode=fuel`);
    })
    .then(r=>r&&r.json())
    .then(d=>{ if(!d) return; const s=d.stations||d.results||[]; const dp=s.length?(s[0].price??s[0].diesel_price??null):null; _el('fuel-diesel',dp?dp.toFixed(1)+'p':'—'); })
    .catch(()=>{ _el('fuel-station','Fuel data unavailable'); });
}

// ── DATA: SCHOOL ──────────────────────────────────────────────
async function _fetchSchoolMsgs() {
  const el = document.getElementById('school-wrap');
  if (!el || !PHONE) return; // hide entirely if no phone — school is opt-in
  try {
    const r = await fetch('/api/school/events?back=21',{headers:{'X-School-WA':PHONE}});
    const data = await r.json();

    // No school profile set up at all — hide section silently
    const profiles = data.profiles || [];
    if (!profiles.length || data.auth || data.error) { el.innerHTML=''; return; }

    // Profile exists but Gmail not connected → show reconnect nudge
    const needsConnect = profiles.some(p => !p.gmail_connected && p.oauth_url);
    if (needsConnect) {
      const oauthUrl = profiles.find(p=>p.oauth_url)?.oauth_url || '';
      el.innerHTML = `
        <div class="school-section-label">School messages</div>
        <div class="school-card" onclick="window.open('${oauthUrl}','_blank')" style="cursor:pointer">
          <div class="school-left"><div class="school-dot" style="background:#818cf8"></div></div>
          <div style="min-width:0;flex:1">
            <div class="school-title">Connect Gmail to sync school emails</div>
            <div class="school-body">Tap to connect — takes 30 seconds. Once linked, school messages appear here automatically.</div>
            <div class="school-meta"><span class="school-tag" style="background:rgba(129,140,248,.12);color:#818cf8">Connect →</span></div>
          </div>
        </div>`;
      return;
    }

    // Gmail connected — show events if any, hide if none yet (still syncing)
    const events = data.events || [];
    if (!events.length) { el.innerHTML=''; return; }

    const sorted = events.slice().sort((a,b)=>(b.event_date||b.created_at||'').localeCompare(a.event_date||a.created_at||''));
    const cards = sorted.slice(0,3).map(m=>{
      const title=m.event_title||m.title||m.subject||'School update';
      const body=m.description||m.summary||m.body||'';
      const school=m.school_name||'';
      const urgent=/urgent|cancel|closure|emergency|important/i.test(title+' '+body);
      const dateStr=m.event_date||m.created_at||'';
      const dateFmt=dateStr?new Date(dateStr).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'';
      return `<div class="school-card${urgent?' urgent':''}">
        <div class="school-left"><div class="school-dot${urgent?' u':''}"></div></div>
        <div style="min-width:0;flex:1">
          <div class="school-title">${_esc(title)}</div>
          ${body?`<div class="school-body">${_esc(body.slice(0,110))}${body.length>110?'…':''}</div>`:''}
          <div class="school-meta">
            ${school?`<span class="school-tag${urgent?' urgent-tag':''}">${_esc(school)}</span>`:''}
            ${dateFmt?`<span>${dateFmt}</span>`:''}
          </div>
        </div>
      </div>`;
    }).join('');
    el.innerHTML = `<div class="school-section-label">School messages<span onclick="nav('myarea')">All →</span></div>${cards}`;
  } catch(e) { el.innerHTML=''; }
}

// ── DATA: SAVES ───────────────────────────────────────────────
function _fetchSaves() {
  const el = document.getElementById('saves-row');
  if (!el) return;
  const pin   = localStorage.getItem('miru_library_pin') || '';
  const phone = PHONE;
  if (!pin && !phone) { el.innerHTML='<div class="save-chip" style="opacity:.35">Link WhatsApp to see saves</div>'; return; }
  const hdrs = {};
  if (pin)   hdrs['X-Library-PIN'] = pin;
  if (phone) hdrs['X-User-Phone']  = phone;
  fetch('/api/wa-saves', {headers: hdrs})
    .then(r=>r.json())
    .then(data=>{
      const saves=data.saves||[];
      if (!saves.length) { el.innerHTML='<div class="save-chip" style="opacity:.35">No saves yet</div>'; return; }
      const icon=t=>({fuel:'⛽',train:'🚆',place:'📍',music:'🎵',note:'📝',intel:'🏢',food:'🍽'}[t]||'📌');
      el.innerHTML=saves.slice(0,8).map(s=>`<div class="save-chip" onclick="nav('saves')">${icon(s.save_type)} ${_esc((s.title||s.label||'Save').slice(0,28))}</div>`).join('');
    })
    .catch(()=>{ el.innerHTML='<div class="save-chip" style="opacity:.35">Saves unavailable</div>'; });
}

// ── HELPERS ───────────────────────────────────────────────────
function _el(id,text){const e=document.getElementById(id);if(e)e.textContent=text;}
function _esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── NAV ───────────────────────────────────────────────────────
const _screenMap={intel:'company',fuel:'fuel',trains:'trains',myarea:'myarea',places:'places',report:'report',music:'music',weather:'myarea',whatsapp:'home'};
function nav(screen){
  if(screen==='home') return;
  if(screen==='saves') { window.location.href='/my-saves'; return; }
  const target=_screenMap[screen]||screen;
  const pcParam=PC?'&pc='+encodeURIComponent(PC):'';
  const usesPc=['trains','fuel','myarea','report'].includes(target);
  window.location.href='/?screen='+target+(usesPc?pcParam:'');
}

// ── PILL NAV ──────────────────────────────────────────────────
let _pillOpen=false;
function _pillTap(e){if(!_pillOpen)_pillExpand();}
function _pillExpand(){_pillOpen=true;document.getElementById('pill-shell').classList.add('expanded');document.getElementById('pill-overlay').classList.add('show');}
function _pillCollapse(){_pillOpen=false;document.getElementById('pill-shell').classList.remove('expanded');document.getElementById('pill-overlay').classList.remove('show');}
function _pillNav(name){
  _pillCollapse();
  const labels={home:'Home',myarea:'My Area',intel:'Intel',saves:'Saves'},icons={home:'🏠',myarea:'📍',intel:'🔍',saves:'📌'};
  ['home','myarea','intel','saves'].forEach(k=>document.getElementById('pi-'+k)?.classList.toggle('pi-active',k===name));
  document.getElementById('pill-icon').textContent=icons[name]||'🏠';
  document.getElementById('pill-label').textContent=labels[name]||name;
  if(name!=='home') nav(name);
}

let _tt;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';clearTimeout(_tt);_tt=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';},1400);}
</script>
