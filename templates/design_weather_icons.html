<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Weather Icons</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #08080a;
    color: #f0f0f2;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    padding: 40px 20px 100px;
    min-height: 100dvh;
  }
  h2 { font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase; color: #555; margin: 32px 0 16px; }

  /* ── GRID ── */
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .cell {
    background: #141416;
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 18px;
    padding: 22px 14px 16px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    cursor: pointer;
    transition: transform .15s;
  }
  .cell:active { transform: scale(.96); }
  .cell-label { font-size: 12px; color: #555; font-weight: 500; letter-spacing: .3px; }
  .cell-temp  { font-size: 15px; font-weight: 700; }

  /* ── ICON CANVAS ── */
  .icon { width: 64px; height: 64px; position: relative; }

  /* ────────────────────────────────────────
     1. CLEAR DAY
  ──────────────────────────────────────── */
  .sun-body {
    position: absolute; inset: 16px;
    background: #fbbf24;
    border-radius: 50%;
    box-shadow: 0 0 12px 4px rgba(251,191,36,.4);
    animation: sun-pulse 3s ease-in-out infinite;
  }
  @keyframes sun-pulse {
    0%,100% { box-shadow: 0 0 12px 4px rgba(251,191,36,.4); }
    50%      { box-shadow: 0 0 20px 8px rgba(251,191,36,.25); }
  }
  .sun-rays {
    position: absolute; inset: 0;
    animation: sun-spin 12s linear infinite;
  }
  .sun-ray {
    position: absolute;
    left: 50%; top: 0;
    width: 2px; height: 10px;
    background: #fbbf24;
    border-radius: 2px;
    transform-origin: 50% 32px;
    opacity: .7;
  }
  @keyframes sun-spin { to { transform: rotate(360deg); } }

  /* ────────────────────────────────────────
     2. PARTLY CLOUDY DAY
  ──────────────────────────────────────── */
  .part-sun {
    position: absolute;
    width: 28px; height: 28px;
    background: #fbbf24;
    border-radius: 50%;
    top: 8px; right: 8px;
    box-shadow: 0 0 10px rgba(251,191,36,.5);
  }
  .cloud-body {
    position: absolute;
    bottom: 8px; left: 4px; right: 4px;
    height: 28px;
    background: #d1d5db;
    border-radius: 14px;
  }
  .cloud-body::before {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    background: #d1d5db;
    border-radius: 50%;
    top: -10px; left: 10px;
  }
  .cloud-body::after {
    content: '';
    position: absolute;
    width: 15px; height: 15px;
    background: #d1d5db;
    border-radius: 50%;
    top: -6px; left: 26px;
  }

  /* ────────────────────────────────────────
     3. OVERCAST
  ──────────────────────────────────────── */
  .cloud-over {
    position: absolute;
    bottom: 10px; left: 6px; right: 6px;
    height: 30px;
    background: #9ca3af;
    border-radius: 15px;
  }
  .cloud-over::before {
    content: '';
    position: absolute;
    width: 26px; height: 26px;
    background: #9ca3af;
    border-radius: 50%;
    top: -13px; left: 8px;
  }
  .cloud-over::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    background: #9ca3af;
    border-radius: 50%;
    top: -10px; left: 26px;
  }
  .cloud-back {
    position: absolute;
    bottom: 6px; left: 2px; right: 2px;
    height: 26px;
    background: #6b7280;
    border-radius: 13px;
    z-index: -1;
  }

  /* ────────────────────────────────────────
     4. LIGHT RAIN
  ──────────────────────────────────────── */
  .rain-cloud {
    position: absolute;
    top: 6px; left: 4px; right: 4px;
    height: 26px;
    background: #6b7280;
    border-radius: 13px;
  }
  .rain-cloud::before {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    background: #6b7280;
    border-radius: 50%;
    top: -10px; left: 6px;
  }
  .rain-cloud::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    background: #6b7280;
    border-radius: 50%;
    top: -7px; left: 22px;
  }
  .drops { position: absolute; bottom: 4px; left: 0; right: 0; display: flex; justify-content: center; gap: 8px; }
  .drop {
    width: 2px; height: 8px;
    background: #60a5fa;
    border-radius: 2px;
    animation: fall 1.2s ease-in infinite;
    opacity: .8;
  }
  .drop:nth-child(2) { animation-delay: .3s; }
  .drop:nth-child(3) { animation-delay: .6s; }
  .drop:nth-child(4) { animation-delay: .15s; }
  @keyframes fall {
    0%   { transform: translateY(-4px); opacity: .8; }
    100% { transform: translateY(10px); opacity: 0; }
  }

  /* ────────────────────────────────────────
     5. HEAVY RAIN
  ──────────────────────────────────────── */
  .rain-heavy-cloud {
    position: absolute;
    top: 4px; left: 2px; right: 2px;
    height: 26px;
    background: #374151;
    border-radius: 13px;
  }
  .rain-heavy-cloud::before {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    background: #374151;
    border-radius: 50%;
    top: -11px; left: 6px;
  }
  .rain-heavy-cloud::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    background: #374151;
    border-radius: 50%;
    top: -8px; left: 24px;
  }
  .drops-h { position: absolute; bottom: 2px; left: 0; right: 0; display: flex; justify-content: center; gap: 5px; }
  .drop-h {
    width: 2px; height: 10px;
    background: #93c5fd;
    border-radius: 2px;
    animation: fall 0.7s ease-in infinite;
  }
  .drop-h:nth-child(2) { animation-delay: .2s; height: 8px; }
  .drop-h:nth-child(3) { animation-delay: .4s; }
  .drop-h:nth-child(4) { animation-delay: .1s; height: 8px; }
  .drop-h:nth-child(5) { animation-delay: .35s; }

  /* ────────────────────────────────────────
     6. THUNDERSTORM
  ──────────────────────────────────────── */
  .storm-cloud {
    position: absolute;
    top: 2px; left: 2px; right: 2px;
    height: 26px;
    background: #1f2937;
    border-radius: 13px;
  }
  .storm-cloud::before {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    background: #1f2937;
    border-radius: 50%;
    top: -11px; left: 8px;
  }
  .storm-cloud::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    background: #1f2937;
    border-radius: 50%;
    top: -8px; left: 26px;
  }
  .bolt {
    position: absolute;
    bottom: 4px;
    left: 50%; transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 8px solid transparent;
    border-right: 4px solid transparent;
    border-top: 18px solid #fbbf24;
    filter: drop-shadow(0 0 6px #fbbf24);
    animation: bolt-flash 2s ease-in-out infinite;
  }
  .bolt::after {
    content: '';
    position: absolute;
    top: -10px; left: -2px;
    width: 0; height: 0;
    border-left: 4px solid transparent;
    border-right: 8px solid transparent;
    border-bottom: 14px solid #fbbf24;
  }
  @keyframes bolt-flash {
    0%,90%,100% { opacity: 1; }
    92%          { opacity: 0; }
    94%          { opacity: 1; }
    96%          { opacity: 0; }
  }

  /* ────────────────────────────────────────
     7. SNOW
  ──────────────────────────────────────── */
  .snow-cloud {
    position: absolute;
    top: 6px; left: 4px; right: 4px;
    height: 26px;
    background: #e2e8f0;
    border-radius: 13px;
  }
  .snow-cloud::before {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    background: #e2e8f0;
    border-radius: 50%;
    top: -11px; left: 6px;
  }
  .snow-cloud::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    background: #e2e8f0;
    border-radius: 50%;
    top: -7px; left: 22px;
  }
  .flakes { position: absolute; bottom: 4px; left: 0; right: 0; display: flex; justify-content: center; gap: 8px; }
  .flake {
    font-size: 11px;
    animation: drift 1.8s ease-in-out infinite;
    opacity: .8;
  }
  .flake:nth-child(2) { animation-delay: .5s; }
  .flake:nth-child(3) { animation-delay: 1s; }
  @keyframes drift {
    0%   { transform: translateY(-2px) rotate(0deg); opacity: .8; }
    100% { transform: translateY(12px) rotate(30deg); opacity: 0; }
  }

  /* ────────────────────────────────────────
     8. FOGGY / MIST
  ──────────────────────────────────────── */
  .fog-lines { position: absolute; inset: 10px; display: flex; flex-direction: column; justify-content: space-around; }
  .fog-line {
    height: 4px; border-radius: 2px;
    background: linear-gradient(90deg, transparent, #9ca3af, transparent);
    animation: fog-drift 3s ease-in-out infinite;
  }
  .fog-line:nth-child(2) { animation-delay: .6s; width: 80%; margin-left: 10%; }
  .fog-line:nth-child(3) { animation-delay: 1.2s; width: 90%; }
  .fog-line:nth-child(4) { animation-delay: .3s; width: 70%; margin-left: 15%; }
  @keyframes fog-drift {
    0%,100% { opacity: .5; transform: translateX(-4px); }
    50%      { opacity: .9; transform: translateX(4px); }
  }

  /* ────────────────────────────────────────
     9. CLEAR NIGHT
  ──────────────────────────────────────── */
  .moon {
    position: absolute;
    top: 10px; left: 14px;
    width: 34px; height: 34px;
    background: #fde68a;
    border-radius: 50%;
    box-shadow: 0 0 16px rgba(253,230,138,.4);
    animation: moon-glow 4s ease-in-out infinite;
  }
  .moon::after {
    content: '';
    position: absolute;
    top: -2px; right: -6px;
    width: 28px; height: 28px;
    background: #08080a;
    border-radius: 50%;
  }
  @keyframes moon-glow {
    0%,100% { box-shadow: 0 0 16px rgba(253,230,138,.4); }
    50%      { box-shadow: 0 0 24px rgba(253,230,138,.25); }
  }
  .stars { position: absolute; inset: 0; }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 2s ease-in-out infinite;
  }
  .star:nth-child(1) { width:2px;height:2px; top:8px;  right:10px; animation-delay:0s; }
  .star:nth-child(2) { width:2px;height:2px; top:20px; right:14px; animation-delay:.7s; }
  .star:nth-child(3) { width:3px;height:3px; top:4px;  right:22px; animation-delay:1.2s; }
  .star:nth-child(4) { width:2px;height:2px; top:14px; right:4px;  animation-delay:.4s; }
  @keyframes twinkle {
    0%,100% { opacity: .9; transform: scale(1); }
    50%      { opacity: .3; transform: scale(.7); }
  }

  /* ────────────────────────────────────────
     10. PARTLY CLOUDY NIGHT
  ──────────────────────────────────────── */
  .night-moon {
    position: absolute;
    top: 6px; right: 10px;
    width: 24px; height: 24px;
    background: #fde68a;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(253,230,138,.3);
  }
  .night-moon::after {
    content: '';
    position: absolute;
    top: -2px; right: -4px;
    width: 20px; height: 20px;
    background: #08080a;
    border-radius: 50%;
  }
  .night-cloud {
    position: absolute;
    bottom: 10px; left: 4px; right: 4px;
    height: 26px;
    background: #4b5563;
    border-radius: 13px;
  }
  .night-cloud::before {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    background: #4b5563;
    border-radius: 50%;
    top: -10px; left: 8px;
  }
  .night-cloud::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    background: #4b5563;
    border-radius: 50%;
    top: -7px; left: 24px;
  }

  /* ────────────────────────────────────────
     11. WINDY
  ──────────────────────────────────────── */
  .wind-lines { position: absolute; inset: 8px; display: flex; flex-direction: column; justify-content: space-around; }
  .wind-line {
    height: 3px; border-radius: 2px;
    background: linear-gradient(90deg, transparent, #93c5fd 40%, transparent);
    animation: wind-blow 1.5s ease-in-out infinite;
  }
  .wind-line:nth-child(2) { animation-delay: .2s; width: 85%; }
  .wind-line:nth-child(3) { animation-delay: .5s; width: 70%; margin-left: 20%; }
  @keyframes wind-blow {
    0%   { transform: translateX(-8px); opacity: 0; }
    20%  { opacity: .9; }
    80%  { opacity: .9; }
    100% { transform: translateX(8px); opacity: 0; }
  }

  /* ────────────────────────────────────────
     12. HOT / HEATWAVE
  ──────────────────────────────────────── */
  .heat-sun {
    position: absolute;
    inset: 12px;
    background: radial-gradient(circle, #ef4444, #f97316);
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(239,68,68,.6);
    animation: heat-pulse 1.5s ease-in-out infinite;
  }
  @keyframes heat-pulse {
    0%,100% { box-shadow: 0 0 20px rgba(239,68,68,.6); transform: scale(1); }
    50%      { box-shadow: 0 0 32px rgba(239,68,68,.4); transform: scale(1.05); }
  }
  .heat-waves { position: absolute; inset: 0; animation: sun-spin 8s linear infinite; }
  .heat-ray {
    position: absolute;
    left: 50%; top: 0;
    width: 2px; height: 10px;
    background: #f97316;
    border-radius: 2px;
    transform-origin: 50% 32px;
    opacity: .6;
  }

  /* temp colours */
  .t-hot    { color: #f87171; }
  .t-warm   { color: #fbbf24; }
  .t-mild   { color: #86efac; }
  .t-cold   { color: #93c5fd; }
  .t-freeze { color: #e2e8f0; }
</style>
</head>
<body>

<h2>Daytime</h2>
<div class="grid">

  <!-- 1. Clear Sun -->
  <div class="cell" onclick="this.style.background='#1c1c20'">
    <div class="icon">
      <div class="sun-body"></div>
      <div class="sun-rays">
        <div class="sun-ray" style="transform:rotate(0deg) translateX(-50%)"></div>
        <div class="sun-ray" style="transform:rotate(45deg) translateX(-50%)"></div>
        <div class="sun-ray" style="transform:rotate(90deg) translateX(-50%)"></div>
        <div class="sun-ray" style="transform:rotate(135deg) translateX(-50%)"></div>
        <div class="sun-ray" style="transform:rotate(180deg) translateX(-50%)"></div>
        <div class="sun-ray" style="transform:rotate(225deg) translateX(-50%)"></div>
        <div class="sun-ray" style="transform:rotate(270deg) translateX(-50%)"></div>
        <div class="sun-ray" style="transform:rotate(315deg) translateX(-50%)"></div>
      </div>
    </div>
    <div class="cell-temp t-hot">22°</div>
    <div class="cell-label">Sunny</div>
  </div>

  <!-- 2. Partly Cloudy -->
  <div class="cell">
    <div class="icon">
      <div class="part-sun"></div>
      <div class="cloud-body"></div>
    </div>
    <div class="cell-temp t-warm">18°</div>
    <div class="cell-label">Partly cloudy</div>
  </div>

  <!-- 3. Overcast -->
  <div class="cell">
    <div class="icon">
      <div class="cloud-back"></div>
      <div class="cloud-over"></div>
    </div>
    <div class="cell-temp t-mild">14°</div>
    <div class="cell-label">Overcast</div>
  </div>

  <!-- 4. Light Rain -->
  <div class="cell">
    <div class="icon">
      <div class="rain-cloud"></div>
      <div class="drops">
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
      </div>
    </div>
    <div class="cell-temp t-mild">12°</div>
    <div class="cell-label">Light rain</div>
  </div>

  <!-- 5. Heavy Rain -->
  <div class="cell">
    <div class="icon">
      <div class="rain-heavy-cloud"></div>
      <div class="drops-h">
        <div class="drop-h"></div>
        <div class="drop-h"></div>
        <div class="drop-h"></div>
        <div class="drop-h"></div>
        <div class="drop-h"></div>
      </div>
    </div>
    <div class="cell-temp t-cold">9°</div>
    <div class="cell-label">Heavy rain</div>
  </div>

  <!-- 6. Thunderstorm -->
  <div class="cell">
    <div class="icon">
      <div class="storm-cloud"></div>
      <div class="bolt"></div>
    </div>
    <div class="cell-temp t-cold">10°</div>
    <div class="cell-label">Thunderstorm</div>
  </div>

  <!-- 7. Snow -->
  <div class="cell">
    <div class="icon">
      <div class="snow-cloud"></div>
      <div class="flakes">
        <div class="flake">❄</div>
        <div class="flake">❄</div>
        <div class="flake">❄</div>
      </div>
    </div>
    <div class="cell-temp t-freeze">-2°</div>
    <div class="cell-label">Snow</div>
  </div>

  <!-- 8. Foggy -->
  <div class="cell">
    <div class="icon">
      <div class="fog-lines">
        <div class="fog-line"></div>
        <div class="fog-line"></div>
        <div class="fog-line"></div>
        <div class="fog-line"></div>
      </div>
    </div>
    <div class="cell-temp t-mild">11°</div>
    <div class="cell-label">Foggy</div>
  </div>

  <!-- 11. Windy -->
  <div class="cell">
    <div class="icon">
      <div class="wind-lines">
        <div class="wind-line"></div>
        <div class="wind-line"></div>
        <div class="wind-line"></div>
      </div>
    </div>
    <div class="cell-temp t-mild">13°</div>
    <div class="cell-label">Windy</div>
  </div>

  <!-- 12. Heatwave -->
  <div class="cell">
    <div class="icon">
      <div class="heat-sun"></div>
      <div class="heat-waves">
        <div class="heat-ray" style="transform:rotate(0deg) translateX(-50%)"></div>
        <div class="heat-ray" style="transform:rotate(45deg) translateX(-50%)"></div>
        <div class="heat-ray" style="transform:rotate(90deg) translateX(-50%)"></div>
        <div class="heat-ray" style="transform:rotate(135deg) translateX(-50%)"></div>
        <div class="heat-ray" style="transform:rotate(180deg) translateX(-50%)"></div>
        <div class="heat-ray" style="transform:rotate(225deg) translateX(-50%)"></div>
        <div class="heat-ray" style="transform:rotate(270deg) translateX(-50%)"></div>
        <div class="heat-ray" style="transform:rotate(315deg) translateX(-50%)"></div>
      </div>
    </div>
    <div class="cell-temp t-hot">34°</div>
    <div class="cell-label">Heatwave</div>
  </div>

</div>

<h2>Night</h2>
<div class="grid">

  <!-- 9. Clear Night -->
  <div class="cell" style="background:#0d0d18">
    <div class="icon">
      <div class="stars">
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
      </div>
      <div class="moon"></div>
    </div>
    <div class="cell-temp t-cold">8°</div>
    <div class="cell-label">Clear night</div>
  </div>

  <!-- 10. Partly Cloudy Night -->
  <div class="cell" style="background:#0d0d18">
    <div class="icon">
      <div class="night-moon"></div>
      <div class="night-cloud"></div>
    </div>
    <div class="cell-temp t-cold">9°</div>
    <div class="cell-label">Cloudy night</div>
  </div>

  <!-- Night Rain -->
  <div class="cell" style="background:#0d0d18">
    <div class="icon">
      <div class="rain-heavy-cloud" style="background:#1f2937"></div>
      <div class="drops-h">
        <div class="drop-h" style="background:#7dd3fc"></div>
        <div class="drop-h" style="background:#7dd3fc"></div>
        <div class="drop-h" style="background:#7dd3fc"></div>
        <div class="drop-h" style="background:#7dd3fc"></div>
        <div class="drop-h" style="background:#7dd3fc"></div>
      </div>
    </div>
    <div class="cell-temp t-cold">7°</div>
    <div class="cell-label">Night rain</div>
  </div>

</div>

</body>
</html>
